<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - RetailIQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* Shadcn-like CSS Variables */
        :root {
            --background: #ffffff;
            --foreground: #09090b;
            --muted: #f4f4f5;
            --muted-foreground: #71717a;
            --border: #e4e4e7;
            --input: #e4e4e7;
            --primary: #18181b;
            --primary-foreground: #fafafa;
            --ring: #18181b;
            --radius: 0.5rem;
            --destructive: #ef4444;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        .shadcn-card {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 384px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            padding: 1.5rem;
            box-sizing: border-box;
        }

        .card-header { text-align: center; }
        .card-title { font-size: 1.5rem; font-weight: 700; margin: 0 0 0.375rem 0; letter-spacing: -0.025em; }
        .card-description { font-size: 0.875rem; color: var(--muted-foreground); margin: 0; }

        .form-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }
        .label { font-size: 0.875rem; font-weight: 500; line-height: 1; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; color: var(--muted-foreground); font-size: 1rem; }
        .input-wrapper .left-icon { left: 0.75rem; }
        .input-wrapper .right-icon { right: 0.75rem; cursor: pointer; }
        .input-wrapper .right-icon:hover { color: var(--foreground); }
        
        .input {
            display: flex;
            width: 100%;
            border-radius: calc(var(--radius) - 2px);
            border: 1px solid var(--input);
            background: transparent;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
            height: 2.25rem;
        }
        .input.pl-10 { padding-left: 2.5rem; }
        .input.pr-10 { padding-right: 2.5rem; }
        .input:focus { outline: none; border-color: var(--ring); box-shadow: 0 0 0 2px rgba(24, 24, 27, 0.2); }
        .input.error { border-color: var(--destructive); }

        .error-message { font-size: 0.875rem; color: var(--destructive); margin-top: 0.25rem; display: none; }

        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .link { font-size: 0.875rem; color: var(--foreground); text-decoration: none; font-weight: 500; }
        .link:hover { text-decoration: underline; }

        .checkbox-wrapper { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }
        .checkbox {
            appearance: none;
            width: 1rem;
            height: 1rem;
            border: 1px solid var(--primary);
            border-radius: 0.25rem;
            display: grid;
            place-content: center;
            cursor: pointer;
            margin: 0;
        }
        .checkbox::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em var(--primary-foreground);
            background-color: var(--primary-foreground);
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .checkbox:checked { background-color: var(--primary); }
        .checkbox:checked::before { transform: scale(1); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: calc(var(--radius) - 2px);
            font-size: 0.875rem;
            font-weight: 500;
            height: 2.25rem;
            padding: 0 1rem;
            background-color: var(--primary);
            color: var(--primary-foreground);
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }
        .btn:hover { background-color: rgba(24, 24, 27, 0.9); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .footer-text { text-align: center; font-size: 0.875rem; color: var(--muted-foreground); margin-top: 1rem; }
        .footer-text a { font-weight: 400; color: var(--foreground); }

        /* General Alert Error */
        .alert-error {
            padding: 0.75rem;
            font-size: 0.875rem;
            color: #b91c1c;
            background-color: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="shadcn-card">
        <div class="card-header">
            <h3 class="card-title">Welcome Back</h3>
            <p class="card-description">Sign in to your account to continue</p>
        </div>

        <div id="generalError" class="alert-error"></div>

        <form id="signInForm">
            <div class="form-group">
                <label class="label" for="email">Email</label>
                <div class="input-wrapper">
                    <i class="bi bi-envelope left-icon"></i>
                    <input type="text" id="email" class="input pl-10" value="admin@retailiq.com">
                </div>
                <div id="emailError" class="error-message"></div>
            </div>

            <div class="form-group">
                <div class="flex-between mb-1">
                    <label class="label" for="password">Password</label>
                    <a href="#" class="link">Forgot password?</a>
                </div>
                <div class="input-wrapper">
                    <i class="bi bi-lock left-icon"></i>
                    <input type="password" id="password" class="input pl-10 pr-10" value="admin123">
                    <i class="bi bi-eye right-icon" id="togglePassword"></i>
                </div>
                <div id="passwordError" class="error-message"></div>
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="rememberMe" class="checkbox">
                <label class="label" for="rememberMe" style="cursor: pointer; font-weight: 400;">Remember me</label>
            </div>

            <button type="submit" id="submitBtn" class="btn">Sign In</button>

            <div class="footer-text">
                Don't have an account? <a href="#" class="link">Sign Up</a>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('signInForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const togglePasswordBtn = document.getElementById('togglePassword');
        
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const generalError = document.getElementById('generalError');

        // Toggle Password Visibility
        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePasswordBtn.classList.toggle('bi-eye');
            togglePasswordBtn.classList.toggle('bi-eye-slash');
        });

        // Form Validation & Submission
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            let isValid = true;
            emailError.style.display = 'none';
            passwordError.style.display = 'none';
            generalError.style.display = 'none';
            emailInput.classList.remove('error');
            passwordInput.classList.remove('error');

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email) {
                emailError.textContent = 'Email is required';
                emailError.style.display = 'block';
                emailInput.classList.add('error');
                isValid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                emailError.textContent = 'Please enter a valid email address';
                emailError.style.display = 'block';
                emailInput.classList.add('error');
                isValid = false;
            }

            if (!password) {
                passwordError.textContent = 'Password is required';
                passwordError.style.display = 'block';
                passwordInput.classList.add('error');
                isValid = false;
            }

            if (isValid) {
                if (email === 'admin@retailiq.com' && password === 'admin123') {
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Signing In...';

                    setTimeout(() => {
                        // Set login state
                        localStorage.setItem('isLoggedIn', 'true');
                        // Redirect to the actual dashboard home page
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    generalError.innerHTML = 'Invalid credentials.<br>Use <strong>admin@retailiq.com</strong> and <strong>admin123</strong>';
                    generalError.style.display = 'block';
                }
            }
        });

        // Clear errors on input
        emailInput.addEventListener('input', () => {
            emailError.style.display = 'none';
            emailInput.classList.remove('error');
        });
        passwordInput.addEventListener('input', () => {
            passwordError.style.display = 'none';
            passwordInput.classList.remove('error');
        });
    </script>
</body>
</html>
