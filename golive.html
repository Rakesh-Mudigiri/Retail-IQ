<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to RetailIQ...</title>
    <!-- Instantly redirect the browser to the local Flask server Dashboard -->
    <meta http-equiv="refresh" content="2;url=http://127.0.0.1:5000/dashboard">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }
        .spinner-border {
            width: 3rem;
            height: 3rem;
        }
    </style>
</head>
<body>
    <div>
        <i class="bi bi-rocket-takeoff" style="font-size: 4rem;"></i>
        <h1 class="mt-3 fw-bold">Starting RetailIQ...</h1>
        <p class="fs-5 mb-4">Connecting to your Python Flask Backend at <b>http://127.0.0.1:5000/</b></p>
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-4 small opacity-75">If you are not redirected automatically, <a href="http://127.0.0.1:5000/dashboard" class="text-white fw-bold">click here</a>.</p>
    </div>
</body>
</html>
